<!DOCTYPE html>
<html>
<head>
    <title>Research Repository | AI Assistant</title>
    <link rel="stylesheet" href="/static/style.css?v=2">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="app">
    
    <div class="navbar">
        <h2 class="logo">AI Research</h2>
        <div class="nav-links">
            <button id="hf-toggle" onclick="toggleHandsFree()" class="hf-btn off">Hands-Free: OFF</button>
            <a href="/"><button>Home</button></a>
            <a href="/study"><button>Study</button></a>
            <a href="/papers"><button>Library</button></a>
            <a href="/saved"><button class="active">Saved</button></a>
            <a href="/commands"><button>Commands</button></a>
            <a href="/trending"><button>Trending</button></a>
            <button id="gaze-toggle" onclick="toggleGaze()" class="hf-btn off gaze-btn">Gaze: OFF</button>
        </div>
        <div id="voice-status-container" class="voice-status-container">
            <div id="voice-indicator" class="voice-indicator"></div>
            <span id="voice-status-text" class="voice-status-text">OFFLINE</span>
        </div>
    </div>

    <div class="main dashboard">
        <div class="dashboard-header glass-card" style="padding: 30px; box-shadow: none; border-radius: 24px; margin-top:20px; width: 100%;">
            <div>
                <h1 style="font-size: 2.5rem; text-align: left; margin-bottom: 8px;">Research Repository</h1>
                <p class="desc" style="text-align: left; margin-bottom: 0;">Upload and manage your scientific literature collection for study.</p>
            </div>
            
            <div class="header-actions">
                <input type="file" id="lib-upload" accept="application/pdf" style="display:none;" onchange="uploadFromLibrary()">
                <button onclick="document.getElementById('lib-upload').click()" class="primary-btn-large" style="padding: 14px 28px; font-size: 1rem; margin: 0;">Upload Paper</button>
            </div>
        </div>
        
        <div id="repo-grid" class="papers-grid" style="margin-top: 40px; width: 100%;">
            <!-- Populated by loadRepository in script.js -->
            <p>Loading your research files...</p>
        </div>
    </div>
</div>

<script src="/static/script.js"></script>
<script src="/static/wave.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<script src="/static/gaze.js?v=6"></script>
<script>
    document.addEventListener("DOMContentLoaded", loadRepositoryList);
</script>
</body>
</html>
