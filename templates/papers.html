<!DOCTYPE html>
<html>

<head>
    <title>Discussion History | Research Library</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

    <div class="app">

        <div class="navbar">
            <h2 class="logo">AI Research</h2>
            <div class="nav-links">
                <button id="hf-toggle" onclick="toggleHandsFree()" class="hf-btn off">Hands-Free: OFF</button>
                <a href="/"><button>Home</button></a>
                <a href="/study"><button>Study</button></a>
                <a href="/papers"><button class="active">Library</button></a>
                <a href="/saved"><button>Saved</button></a>
                <a href="/commands"><button>Commands</button></a>
                <a href="/trending"><button>Trending</button></a>
                <a href="/ai-tutor"><button>Tutor</button></a>
                <button id="gaze-toggle" onclick="toggleGaze()" class="hf-btn off gaze-btn">Gaze: OFF</button>
            </div>
            <div id="voice-status-container" class="voice-status-container">
                <div id="voice-indicator" class="voice-indicator"></div>
                <span id="voice-status-text" class="voice-status-text">OFFLINE</span>
            </div>
        </div>

        <div class="main dashboard">
            <div class="dashboard-header glass-card"
                style="padding: 30px; box-shadow: none; border-radius: 24px; margin-top:20px; width: 100%;">
                <div>
                    <h1 style="font-size: 2.5rem; text-align: left; margin-bottom: 8px;">Discussion History</h1>
                    <p class="desc" style="text-align: left; margin-bottom: 0;">Access and resume all your previous
                        voice and text-based research sessions.</p>
                </div>
            </div>

            <div id="discussions-grid" class="papers-grid" style="margin-top: 40px; width: 100%;">
                <!-- Populated by loadDiscussions in script.js?v=1775866520 -->
                <p>Loading your discussions...</p>
            </div>
        </div>
    </div>

    <script src="/static/script.js?v=1775866520"></script>
    <script src="/static/wave.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="/static/gaze.js?v=6"></script>
    <script>
        document.addEventListener("DOMContentLoaded", loadDiscussions);
    </script>
</body>

</html>
